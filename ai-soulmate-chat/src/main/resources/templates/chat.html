<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI伴侣聊天屋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        love: '#ff78a8',
                        loveLight: '#ffe6ef',
                        darkLove: '#e65c8c'
                    }
                }
            }
        }
    </script>
    <style>
        /* 滚动条美化 */
        #chatContent::-webkit-scrollbar {width:6px}
        #chatContent::-webkit-scrollbar-thumb {background:#ffb6c9;border-radius:3px}
        /* 消息打字闪烁光标 */
        .cursor-blink{animation: blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        /* 备忘录滚动条 */
        #noteContent::-webkit-scrollbar {width:4px}
        #noteContent::-webkit-scrollbar-thumb {background:#ffb6c9;border-radius:2px}
        #noteListWrap::-webkit-scrollbar {width:4px}
        #noteListWrap::-webkit-scrollbar-thumb {background:#ffb6c9;border-radius:2px}

        /* ========== 横线笔记本背景样式 ========== */
        .line-note {
            background-image: linear-gradient(#ffd6e0 1px, transparent 1px);
            background-size: 100% 28px;
            background-color: #fffef9;
            line-height: 28px;
        }
        /* 动漫风长方形橡皮按钮 */
        .eraser-btn {
            background: #ffc8d8;
            border-radius: 3px;
            padding: 3px 9px;
            color: #c75174;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid #f8b8cc;
            cursor: pointer;
            box-shadow: inset 0 1px 0 #ffe0eb, 0 1px 2px rgba(0,0,0,0.08);
        }
        .eraser-btn:hover {
            background: #ffb3c8;
            color: #b03f60;
            transform: scale(1.05);
            box-shadow: inset 0 1px 0 #ffd4e2, 0 2px 4px rgba(0,0,0,0.12);
        }
        /* 必填星号样式 */
        .required {
            color: #ef4444;
            margin-left: 2px;
        }
        /* 聊天记录分组分割线 */
        .group-block .text-center span {
            position: relative;
        }
        .whitespace-pre-wrap {
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-pink-100 min-h-screen">
<div class="container mx-auto max-w-5xl py-6 px-3">
    <!-- 顶部标题栏 【修改处：新增聊天记录按钮，两个按钮加间距】 -->
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-[26px] font-bold text-love flex items-center gap-2">
            <i class="fa fa-heart"></i> AI伴侣聊天屋
        </h1>
        <div class="flex gap-3">
            <button id="chatRecordBtn" class="bg-love hover:bg-darkLove text-white px-4 py-2 rounded-full shadow-md transition">
                <i class="fa fa-history mr-1"></i>聊天记录
            </button>
            <button id="openSetBtn" class="bg-love hover:bg-darkLove text-white px-4 py-2 rounded-full shadow-md transition">
                <i class="fa fa-cog mr-1"></i>人设配置
            </button>
        </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- 左侧整列：固定高度 650px，和右侧聊天窗口对齐 -->
        <div class="lg:col-span-1 flex flex-col gap-4 h-[650px]">
            <!-- 左侧女友信息卡片 -->
            <div class="bg-white rounded-xl shadow-lg p-4 h-fit">
                <div class="text-center">
                    <div class="w-[140px] h-[140px] rounded-full overflow-hidden border-4 border-loveLight mx-auto mb-3">
                        <img id="girlAvatar" th:src="${soulmate_avatar_info.avatarUrl ?: '/default.png'}" class="w-full h-full object-cover">
                    </div>
                    <h3 id="girlName" class="text-xl font-semibold text-gray-700" th:text="${soulmate_info.gfName}">小桃</h3>
                    <p id="girlPerson" class="text-sm text-gray-500 mt-1" th:text="${soulmate_info.characterTag}">温柔黏人、贴心小女友</p>
                    <p class="text-xs text-love mt-1">性别：<span id="sexShow" th:text="${soulmate_info.sex ?: '女'}">女</span> | <span id="ageShow" th:text="${soulmate_info.age ?: 18}">18</span>岁</p>
                    <p class="text-xs text-gray-50 mt-1">爱好：<span id="hobbyShow" th:text="${soulmate_info.hobby ?: '追剧美食'}">追剧美食</span></p>
                    <p class="text-sm mt-1 text-gray-500" id="girlRemark" th:text="${soulmate_info.detailPrompt}">喜欢撒娇，生气需要哄</p>
                </div>
            </div>

            <!-- 备忘录：剩余高度自动填充 + 横线笔记本样式 -->
            <div class="bg-white rounded-xl shadow-lg p-4 flex flex-col flex-1">
                <div class="flex items-center justify-between mb-3">
                    <h4 class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa fa-book text-love"></i>备忘录
                    </h4>
                    <div class="flex gap-2">
                        <!-- 新增浏览按钮，和保存按钮样式统一 -->
                        <button id="viewNoteBtn" class="text-love hover:text-darkLove transition text-sm">
                            <i class="fa fa-eye"></i> 浏览
                        </button>
                        <button id="saveNoteBtn" class="text-love hover:text-darkLove transition text-sm">
                            <i class="fa fa-save"></i> 保存
                        </button>
                    </div>
                </div>
                <!-- 增加 line-note 横线本样式，移除原有边框，贴合笔记本效果 -->
                <textarea id="noteContent"
                          class="flex-1 border-0 rounded-lg p-2 text-sm resize-none outline-none line-note"
                          placeholder="在这里记录笔记、提醒事项..."></textarea>
            </div>
        </div>

        <!-- 右侧聊天区域 -->
        <div class="lg:col-span-3 flex flex-col bg-white rounded-xl shadow-lg overflow-hidden h-[650px]">
            <!-- 聊天记录容器 -->
            <div id="chatContent" class="flex-1 overflow-y-auto p-5 space-y-4">
                <div class="flex gap-3">
                    <img id="chatAvatarLeft" th:src="${soulmate_avatar_info.avatarUrl ?: '/default.png'}" class="w-10 h-10 rounded-full object-cover shrink-0">
                    <div class="bg-loveLight px-4 py-3 rounded-xl rounded-tl-none max-w-[75%]">
                        <p id="firstMsg"></p>
                    </div>
                </div>
            </div>
            <!-- 发送输入框 -->
            <div class="border-t p-4 flex gap-3">
                <textarea id="userInput" rows="2" placeholder="输入你想说的话..."
                          class="flex-1 border border-gray-200 rounded-lg p-3 focus:outline-love resize-none"></textarea>
                <button id="sendBtn" class="bg-love hover:bg-darkLove text-white px-5 rounded-lg transition shrink-0">
                    <i class="fa fa-paper-plane"></i> 发送
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 备忘录浏览弹窗（横线笔记本样式） -->
<div id="noteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white w-full max-w-lg rounded-xl shadow-xl p-5 m-4 max-h-[80vh] flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h4 class="text-gray-700 font-semibold flex items-center gap-2">
                <i class="fa fa-book text-love"></i> 全部备忘录
            </h4>
            <button id="closeNoteModal" class="text-gray-400 hover:text-gray-700 text-xl">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <!-- 笔记列表容器 横线背景 -->
        <div id="noteListWrap" class="flex-1 overflow-y-auto line-note p-2">
            <!-- 笔记列表由JS动态渲染 -->
            <div id="noteList"></div>
        </div>
    </div>
</div>

<!-- 配置弹窗【姓名/年龄/生日/爱好/性别/标签/人设/头像 全部字段】 -->
<div id="setModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 overflow-y-auto py-6">
    <div class="bg-white w-full max-w-md rounded-xl p-6 m-3 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-700">自定义伴侣人设</h2>
            <button id="closeModal" class="text-gray-400 hover:text-gray-700"><i class="fa fa-times text-xl"></i></button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-sm text-gray-600">头像上传（本地图片）</label>
                <input type="file" id="avatarUpload" accept="image/*"
                       class="w-full border rounded p-2 mt-1">
                <!-- 弹窗头像预览 -->
                <div class="mt-2 flex justify-center">
                    <img id="previewImg" src="" class="w-24 h-24 rounded-full object-cover border-2 border-loveLight hidden">
                </div>
            </div>
            <!-- 伴侣名字 - 必填 -->
            <div>
                <label class="text-sm text-gray-600">伴侣名字<span class="required">*</span></label>
                <input id="nameInput" type="text" class="w-full border rounded p-2 mt-1" th:value="${soulmate_info.gfName}" placeholder="例如：小桃">
            </div>
            <div>
                <label class="text-sm text-gray-600">伴侣性别</label>
                <div class="flex gap-6 mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="sexRadio" value="男" th:checked="${soulmate_info.sex eq '男'}">男
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="sexRadio" value="女" th:checked="${soulmate_info.sex ?: '女'}">女
                    </label>
                </div>
            </div>
            <div>
                <label class="text-sm text-gray-600">生日</label>
                <input id="birthInput" type="date" class="w-full border rounded p-2 mt-1" th:value="${soulmate_info.birth}">
            </div>
            <div>
                <label class="text-sm text-gray-600">兴趣爱好</label>
                <input id="hobbyInput" type="text" class="w-full border rounded p-2 mt-1" th:value="${soulmate_info.hobby}" placeholder="追剧、美食、旅行">
            </div>
            <!-- 性格标签 - 必填 -->
            <div>
                <label class="text-sm text-gray-600">性格标签<span class="required">*</span></label>
                <input id="personInput" type="text" class="w-full border rounded p-2 mt-1" th:value="${soulmate_info.characterTag}" placeholder="温柔傲娇 /高冷御姐 /活泼元气">
            </div>
            <!-- 人设详细设定 - 必填 -->
            <div>
                <label class="text-sm text-gray-600">人设详细设定<span class="required">*</span></label>
                <textarea id="remarkInput" rows="3" class="w-full border rounded p-2 mt-1 resize-none" th:text="${soulmate_info.detailPrompt}"
                          placeholder="你是我的女朋友，说话可爱撒娇，不能太官方，日常闲聊风格"></textarea>
            </div>
            <button id="saveSet" class="w-full bg-love text-white py-2 rounded-lg hover:bg-darkLove transition">保存配置</button>
        </div>
    </div>
</div>

<!-- 聊天记录弹窗 按天分组 -->
<div id="chatRecordModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 overflow-y-auto py-8">
    <div class="bg-white w-full max-w-3xl rounded-xl shadow-xl p-5 m-4 max-h-[85vh] flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h4 class="text-gray-700 font-semibold flex items-center gap-2 text-lg">
                <i class="fa fa-history text-love"></i> 历史聊天记录
            </h4>
            <button id="closeChatRecordModal" class="text-gray-400 hover:text-gray-700 text-xl">
                <i class="fa fa-times"></i>
            </button>
        </div>
        <!-- 聊天记录滚动容器 -->
        <div id="chatRecordWrap" class="flex-1 overflow-y-auto space-y-6 pr-2">
            <!-- JS动态渲染分组内容 -->
        </div>
    </div>
</div>

<script th:inline="javascript">
    // 后端数据
    const soulmateInitData = /*[[${soulmate_info}]]*/{};
    const avatarInitData = /*[[${soulmate_avatar_info}]]*/{};
    const STORAGE_KEY = "girlFriendSet";
    let tempUploadUrl = ""; //临时存本次上传图片地址

    let girlConfig = {
        avatarId: avatarInitData?.avatarId ?? "",
        soulmateId: soulmateInitData?.soulmateId ?? "",
        avatar: avatarInitData?.avatarUrl || "/default.png",
        name: soulmateInitData?.gfName || "小桃",
        age: soulmateInitData?.age || 18,
        birth: soulmateInitData?.birth || "",
        hobby: soulmateInitData?.hobby || "追剧美食",
        person: soulmateInitData?.characterTag || "",
        remark: soulmateInitData?.detailPrompt || "",
        sex: soulmateInitData?.sex || "女"
    };

    const openSetBtn = document.getElementById("openSetBtn");
    const closeModal = document.getElementById("closeModal");
    const setModal = document.getElementById("setModal");
    const saveSet = document.getElementById("saveSet");
    const girlAvatar = document.getElementById("girlAvatar");
    const chatAvatarLeft = document.getElementById("chatAvatarLeft");
    const previewImg = document.getElementById("previewImg");
    const avatarUpload = document.getElementById("avatarUpload");
    const nameInput = document.getElementById("nameInput");
    const birthInput = document.getElementById("birthInput");
    const hobbyInput = document.getElementById("hobbyInput");
    const personInput = document.getElementById("personInput");
    const remarkInput = document.getElementById("remarkInput");
    const chatContent = document.getElementById("chatContent");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    // 新增聊天记录按钮DOM
    const chatRecordBtn = document.getElementById("chatRecordBtn");
    // 聊天记录弹窗DOM
    const chatRecordModal = document.getElementById("chatRecordModal");
    const closeChatRecordModal = document.getElementById("closeChatRecordModal");
    const chatRecordWrap = document.getElementById("chatRecordWrap");

    // 备忘录DOM
    const noteContent = document.getElementById("noteContent");
    const saveNoteBtn = document.getElementById("saveNoteBtn");
    const viewNoteBtn = document.getElementById("viewNoteBtn");
    const noteModal = document.getElementById("noteModal");
    const closeNoteModal = document.getElementById("closeNoteModal");
    const noteList = document.getElementById("noteList");

    /**
     * 加载当前伴侣全部备忘录（调用GET /memo/list/{soulmateId}）
     */
    async function loadMemoList() {
        const soulmateId = girlConfig.soulmateId;
        if (!soulmateId) {
            noteList.innerHTML = `<div class="text-center text-gray-400 py-10">未选择虚拟伴侣，无法加载备忘录</div>`;
            return [];
        }
        try {
            noteList.innerHTML = `<div class="text-center text-gray-400 py-10">加载中...</div>`;
            const res = await fetch(`/memo/list/${soulmateId}`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });
            if (!res.ok) throw new Error("接口请求失败");
            const jsonRes = await res.json();
            const list = jsonRes.code === 1 ? jsonRes.data : [];
            renderNoteList(list);
            return list;
        } catch (err) {
            noteList.innerHTML = `<div class="text-center text-red-400 py-10">加载备忘录失败，请刷新重试</div>`;
            console.error("加载备忘录异常：", err);
            return [];
        }
    }

    /**
     * 渲染备忘录列表
     * @param {Array} list 后端返回 MemoEntity 数组
     */
    function renderNoteList(list) {
        if (!list || list.length === 0) {
            noteList.innerHTML = `<div class="text-center text-gray-400 py-10">暂无备忘录，快去创建吧</div>`;
            return;
        }
        let html = "";
        list.forEach(item => {
            const createTime = item.createTime ? new Date(item.createTime).toLocaleString() : "";
            html += `
                <div class="flex items-start justify-between py-2 border-b border-loveLight/30">
                    <div class="flex-1 pr-2">
                        <div class="text-xs text-gray-400">${createTime}</div>
                        <div class="text-sm text-gray-700 break-all whitespace-pre-wrap">${item.content}</div>
                    </div>
                    <button class="del-note-btn eraser-btn ml-2" data-doc-id="${item.docId}">
                        <i class="fa fa-eraser"></i>
                    </button>
                </div>
            `;
        });
        noteList.innerHTML = html;

        // 删除按钮
        document.querySelectorAll(".del-note-btn").forEach(btn => {
            btn.onclick = async function () {
                const docId = this.dataset.docId;
                if (!confirm("确定删除这条备忘录？删除后无法恢复")) return;
                try {
                    // 调用删除接口 POST /memo/delete/{docId}
                    const delRes = await fetch(`/memo/delete/${docId}`, {
                        method: "POST"
                    });
                    const jsonDel = await delRes.json();
                    if (jsonDel.code === 1 && jsonDel.data === true) {
                        alert("删除成功");
                        loadMemoList(); // 刷新列表
                    } else {
                        alert("删除失败");
                    }
                } catch (err) {
                    alert("删除请求异常");
                    console.error("删除备忘录异常：", err);
                }
            }
        });
    }

    /**
     * 保存新建备忘录（调用POST /memo/add?soulmateId=xxx）
     */
    async function saveNewMemo() {
        const content = noteContent.value.trim();
        const soulmateId = girlConfig.soulmateId;
        if (!content) {
            alert("备忘录内容不能为空！");
            noteContent.focus();
            return;
        }
        if (!soulmateId) {
            alert("请先保存虚拟伴侣配置！");
            return;
        }
        try {
            // 请求后端新增接口
            const res = await fetch(`/memo/add`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: content,
                    soulmateId: soulmateId
                })
            });
            const jsonAdd = await res.json();
            if (jsonAdd.code === 1 && jsonAdd.data) {
                alert("备忘录保存成功！");
                noteContent.value = "";
                loadMemoList(); // 刷新弹窗列表
            } else {
                alert("保存失败，请重试");
            }
        } catch (err) {
            alert("保存备忘录请求异常");
            console.error("新增备忘录异常：", err);
        }
    }

    // 保存按钮点击
    saveNoteBtn.onclick = saveNewMemo;

    // 打开备忘录浏览弹窗
    viewNoteBtn.onclick = async function () {
        noteModal.classList.replace("hidden", "flex");
        // 弹窗打开时自动加载最新数据
        await loadMemoList();
    };

    // 关闭备忘录弹窗
    closeNoteModal.onclick = function () {
        noteModal.classList.add("hidden");
    };

    async function loadFirstHello() {
        try {
            let res = await fetch("/chat/get-first-msg?soulmateId=" + girlConfig.soulmateId);
            let jsonData = await res.json();
            let helloText = jsonData.code === 1 ? jsonData.data : "哈喽~终于来找我聊天啦，今天过得怎么样呀？";
            document.getElementById("firstMsg").innerText = helloText;
        } catch (err) {
            document.getElementById("firstMsg").innerText = "哈喽~终于来找我聊天啦，今天过得怎么样呀？";
        }
    }
    loadFirstHello();

    openSetBtn.onclick = ()=> {
        setModal.classList.replace("hidden","flex");
        // 每次打开弹窗重新加载头像预览
        const previewImg = document.getElementById("previewImg");
        if(girlConfig.avatar && girlConfig.avatar !== "/default.png"){
            previewImg.src = girlConfig.avatar;
            previewImg.classList.remove("hidden");
        }else{
            previewImg.classList.add("hidden");
            previewImg.src = "";
        }
    };
    closeModal.onclick = ()=> setModal.classList.add("hidden");

    avatarUpload.onchange = async function(){
        const file = this.files[0];
        if(!file) return;
        //本地预览（瞬间出现，不用等后端）
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e=>{
            previewImg.src = e.target.result;
            previewImg.classList.remove("hidden");
        }

        let fd = new FormData();
        fd.append("file",file);
        let res = await fetch("/avatar/soulmate/upload",{method:"POST",body:fd});
        let jsonUpload = await res.json();
        tempUploadUrl = jsonUpload.code === 1 ? jsonUpload.data : "";
        //左侧头像同步刷新
        girlAvatar.src = tempUploadUrl;
        chatAvatarLeft.src = tempUploadUrl;
    }

    //保存按钮 —— 【添加必填校验】
    saveSet.onclick = async () => {

        const nameVal = nameInput.value.trim();
        const personVal = personInput.value.trim();
        const remarkVal = remarkInput.value.trim();

        if (!nameVal) {
            alert("请填写伴侣名字！");
            nameInput.focus();
            return;
        }
        if (!personVal) {
            alert("请填写性格标签！");
            personInput.focus();
            return;
        }
        if (!remarkVal) {
            alert("请填写人设详细设定！");
            remarkInput.focus();
            return;
        }

        if(tempUploadUrl) girlConfig.avatar = tempUploadUrl;
        let selectSex = document.querySelector('input[name="sexRadio"]:checked')?.value || "女";
        girlConfig.name = nameVal;
        girlConfig.birth = birthInput.value.trim();
        //自动计算年龄
        girlConfig.age = getAge(girlConfig.birth) || 18;
        girlConfig.hobby = hobbyInput.value.trim();
        girlConfig.person = personVal;
        girlConfig.remark = remarkVal;
        girlConfig.sex = selectSex;

        let formData = new FormData();
        if(girlConfig.soulmateId) formData.append("id", girlConfig.soulmateId);
        formData.append("gfName", girlConfig.name);
        formData.append("age", girlConfig.age);
        if(girlConfig.birth) formData.append("birth", girlConfig.birth);
        formData.append("hobby", girlConfig.hobby);
        formData.append("characterTag", girlConfig.person);
        formData.append("detailPrompt", girlConfig.remark);
        formData.append("sex", selectSex);
        if(girlConfig.avatarId) formData.append("avatarId", girlConfig.avatarId);
        if(girlConfig.avatar) formData.append("avatarUrl", girlConfig.avatar);

        await fetch("/setting/soulmate/update", {method:"POST", body: formData});
        tempUploadUrl = "";
        previewImg.classList.add("hidden");
        previewImg.src = "";
        setModal.classList.add("hidden");

        // 保存配置后，立即同步聊天区头像 + 左侧信息卡片头像
        girlAvatar.src = girlConfig.avatar;
        chatAvatarLeft.src = girlConfig.avatar;

        initConfig();
    };

    /**
     * @param {string} birthStr yyyy-MM-dd
     * @returns {number} 周岁 | 未来生日返回0
     */
    function getAge(birthStr) {
        const birthArr = birthStr.split('-');
        const birthYear = parseInt(birthArr[0]);
        const birthMonth = parseInt(birthArr[1]) - 1;
        const birthDay = parseInt(birthArr[2]);

        const birthDate = new Date(birthYear, birthMonth, birthDay);
        const now = new Date();

        // 生日在未来，返回0（和后端一致）
        if (birthDate > now) {
            return 0;
        }

        let age = now.getFullYear() - birthDate.getFullYear();
        // 当年生日还没过，年龄-1
        const currBirthDay = new Date(now.getFullYear(), birthMonth, birthDay);
        if (now < currBirthDay) {
            age--;
        }
        return age;
    }

    //聊天发送
    async function sendChat(){
        const content = userInput.value.trim();
        if(!content) return;
        userInput.value = "";
        //我方消息
        chatContent.innerHTML += `
        <div class="flex gap-3 justify-end">
            <div class="bg-love px-4 py-3 rounded-xl rounded-tr-none text-white max-w-[75%]">
                <p>${content}</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-gray-300 shrink-0 flex items-center justify-center text-white">我</div>
        </div>
    `;
        //AI消息容器
        const aiWrap = document.createElement("div");
        aiWrap.className = "flex gap-3";
        aiWrap.innerHTML = `
        <img src="${girlConfig.avatar}" class="w-10 h-10 rounded-full object-cover shrink-0">
        <div class="bg-loveLight px-4 py-3 rounded-xl rounded-tl-none max-w-[75%]">
            <p id="tempAiText"></p>
        </div>
    `;
        chatContent.appendChild(aiWrap);
        const tempText = aiWrap.querySelector("#tempAiText");
        chatContent.scrollTop = chatContent.scrollHeight;

        //存储完整AI文本、打字队列
        let fullAiText = "";
        let typeQueue = [];
        let typingLock = false;

        // 逐个字符输出
        async function typeWriter(){
            if(typingLock || typeQueue.length ===0) return;
            typingLock = true;
            const char = typeQueue.shift();
            tempText.innerText += char;
            chatContent.scrollTop = chatContent.scrollHeight;
            await sleep(35); //打字速度，数值越大越慢
            typingLock = false;
            typeWriter();
        }
        //延时工具
        function sleep(ms){
            return new Promise(res=>setTimeout(res,ms))
        }

        const resp = await fetch("/chat/ai-chat-stream",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Accept":"text/event-stream"
            },
            body:JSON.stringify({userPrompt:content,soulmateId:girlConfig.soulmateId})
        });
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();

        while(true){
            const {done,value} = await reader.read();
            if(done) break;
            let chunk = decoder.decode(value);
            chunk = chunk.replaceAll("data:","").replaceAll("\n","");
            fullAiText += chunk;
            //新字符推入打字队列
            for(let c of chunk){
                typeQueue.push(c);
            }
            //启动打字
            typeWriter();
            typeWriter();
        }
    }
    sendBtn.onclick = sendChat;
    userInput.onkeydown = (e)=>{
        if(e.key === "Enter" && !e.shiftKey){
            e.preventDefault();
            sendChat();
        }
    }

    // 打开聊天记录弹窗、请求后端分组数据
    chatRecordBtn.onclick = async function () {
        // 展示弹窗
        chatRecordModal.classList.replace("hidden", "flex");
        chatRecordWrap.innerHTML = `<div class="text-center text-gray-400 py-10">加载中...</div>`;
        try {
            const res = await fetch(`/chat/memory/group_by_day?soulmateId=${girlConfig.soulmateId}`);
            const jsonGroup = await res.json();
            const groupData = jsonGroup.code === 1 ? jsonGroup.data : [];
            renderChatRecordGroup(groupData);
        } catch (err) {
            chatRecordWrap.innerHTML = `<div class="text-center text-red-400 py-10">加载记录失败，请稍后重试</div>`;
            console.error("加载聊天记录异常：", err);
        }
    };
    // 关闭聊天记录弹窗
    closeChatRecordModal.onclick = function () {
        chatRecordModal.classList.add("hidden");
    };

    /**
     * 渲染按天分组聊天记录
     * @param {Array} groupList 后端返回 ChatMemoryGroupVO 数组
     */
    function renderChatRecordGroup(groupList) {
        if (!groupList || groupList.length === 0) {
            chatRecordWrap.innerHTML = `<div class="text-center text-gray-400 py-10">暂无历史聊天记录</div>`;
            return;
        }
        let html = "";
        groupList.forEach(group => {
            // 分组标题：今天 / 昨天 / 2026-06-15
            html += `
                <div class="group-block">
                    <div class="text-center text-sm text-gray-500 mb-3 relative before:content-[''] before:absolute before:w-full before:h-[1px] before:bg-gray-200 before:left-0 before:top-1/2">
                        <span class="bg-white px-3 relative z-10">${group.groupTitle}</span>
                    </div>
                    <div class="space-y-3 pl-2 pr-2">
            `;
            // 遍历当天消息
            group.msgList.forEach(msg => {
                // msgType 1 用户，2 AI伴侣
                if (msg.msgType === 1) {
                    // 用户消息 居右 粉色背景
                    html += `
                        <div class="flex gap-3 justify-end">
                            <div class="bg-love px-4 py-3 rounded-xl rounded-tr-none text-white max-w-[75%]">
                                <p class="whitespace-pre-wrap">${msg.content || ""}</p>
                                <div class="text-xs opacity-70 mt-1 text-right">${msg.createTime}</div>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-gray-400 shrink-0 flex items-center justify-center text-white">我</div>
                        </div>
                    `;
                } else if (msg.msgType === 2) {
                    // AI伴侣消息 居左 浅粉背景
                    html += `
                        <div class="flex gap-3">
                            <img src="${girlConfig.avatar}" class="w-10 h-10 rounded-full object-cover shrink-0">
                            <div class="bg-loveLight px-4 py-3 rounded-xl rounded-tl-none max-w-[75%]">
                                <p class="whitespace-pre-wrap text-gray-700">${msg.content || ""}</p>
                                <div class="text-xs text-gray-400 mt-1">${msg.createTime}</div>
                            </div>
                        </div>
                    `;
                }
            });
            html += `</div></div>`;
        });
        chatRecordWrap.innerHTML = html;
    }

    //初始化页面
    function initConfig(){
        girlAvatar.src = girlConfig.avatar;
        chatAvatarLeft.src = girlConfig.avatar;
        nameInput.value = girlConfig.name;
        birthInput.value = girlConfig.birth;
        hobbyInput.value = girlConfig.hobby;
        personInput.value = girlConfig.person;
        remarkInput.value = girlConfig.remark;
        document.querySelectorAll('input[name="sexRadio"]').forEach(item=>{
            item.checked = item.value === girlConfig.sex;
        })
        document.getElementById("girlName").innerText = girlConfig.name;
        document.getElementById("sexShow").innerText = girlConfig.sex;
        document.getElementById("ageShow").innerText = girlConfig.age;
        document.getElementById("hobbyShow").innerText = girlConfig.hobby;
        document.getElementById("girlRemark").innerText = girlConfig.remark;

        const previewImg = document.getElementById("previewImg");
        if(girlConfig.avatar && girlConfig.avatar !== "/default.png"){
            previewImg.src = girlConfig.avatar;
            previewImg.classList.remove("hidden");
        }else{
            previewImg.classList.add("hidden");
            previewImg.src = "";
        }

        // 清空本地缓存逻辑，不再读取localStorage
        noteContent.value = "";
    }
    initConfig();
</script>
