<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的AI伴侣大厅</title>
    <link href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" rel="stylesheet">
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",system-ui}
        body {background: linear-gradient(145deg,#f0f4ff,#fcfaff);min-height:100vh;padding:52px 40px;}
        .wrap {max-width:1560px;margin:0 auto;}
        .head {display:flex;justify-content:space-between;align-items:center;margin-bottom:48px}
        h1 {font-size:36px;color:#2d3748;font-weight:600;letter-spacing:1px}
        .btn-add {
            padding:14px 30px;border:none;border-radius:16px;
            background:linear-gradient(135deg,#5b7fff,#8b5cf6);
            color:#fff;font-size:16px;cursor:pointer;box-shadow:0 6px 18px rgba(91,127,255,0.25);
            transition:0.25s ease;
        }
        .btn-add:hover {transform:translateY(-3px);box-shadow:0 10px 24px rgba(91,127,255,0.3)}
        .row{display:flex;flex-wrap:wrap;gap:36px;}
        .col-5{width:calc(20% - 29px);}
        .card-item {
            width:100%;
            height:370px;
            background:#ffffff;border-radius:22px;padding:30px 22px;
            transition:all 0.3s ease;border:1px solid #e8eeff;cursor:pointer;
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .card-item:hover {
            transform: translateY(-12px);
            box-shadow:0 20px 42px rgba(91,127,255,0.14);
            border-color:#d1ddff;
        }
        .avatar {
            width:144px;height:144px;border-radius:50%;object-fit:cover;
            margin:0 auto 20px;display:block;border:4px solid #f0f5ff;background:#f6f9ff;
        }
        .name {text-align:center;font-size:21px;margin-bottom:14px;color:#2d3748;font-weight:500}
        .tag-box {display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
        .add-empty {
            width:100%;height:370px;border:2px dashed #b4c6f0;border-radius:22px;
            display:flex;align-items:center;justify-content:center;font-size:46px;color:#94a3b8;
            cursor:pointer;background:#f9fbff;transition:0.3s;
        }
        .add-empty:hover {border-color:#7b9fff;background:#f4f8ff;color:#64748b}

        /* 弹窗样式优化 */
        .dialog-mask{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(15,23,42,0.55);display:none;align-items:center;justify-content:center;z-index:999
        }
        .dialog-box{width:660px;background:#fff;border-radius:18px;padding:28px;box-shadow:0 22px 60px rgba(0,0,0,0.12)}
        .dialog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:20px;font-weight:600;color:#2d3748}
        .close-btn{cursor:pointer;color:#9ca3af;font-size:22px;transition:0.2s}
        .close-btn:hover{color:#ef4444}
        .form-item{margin-bottom:22px}
        .form-item label{display:block;margin-bottom:8px;color:#374151;font-weight:500}
        .required{color:#ef4444;margin-right:4px;}
        .ipt{
            width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:10px;outline:none;
            font-size:15px;transition:0.2s;
        }
        .ipt:focus{border-color:#5b7fff;box-shadow:0 0 0 3px rgba(91,127,255,0.15)}
        .form-footer{margin-top:28px;text-align:right}
        .btn-cancel{
            padding:10px 22px;border:1px solid #d1d5db;background:#fff;border-radius:10px;
            cursor:pointer;margin-right:12px;font-size:15px;transition:0.2s
        }
        .btn-cancel:hover{background:#f3f4f6}
        .btn-save{
            padding:10px 26px;border:none;background:linear-gradient(135deg,#5b7fff,#8b5cf6);
            color:#fff;border-radius:10px;cursor:pointer;font-size:15px;
            box-shadow:0 4px 12px rgba(91,127,255,0.22);transition:0.2s
        }
        .btn-save:hover{opacity:0.92}
        #tip{padding-left:6px}
        .del-btn{
            margin:12px auto 0;
            display:block;
            padding:8px 20px;
            border:none;
            border-radius:9px;
            background:#f87272;
            color:#fff;
            cursor:pointer;
            transition:0.2s;
        }
        .del-btn:hover{
            background:#ef4444;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="head">
        <h1>我的AI伴侣大厅</h1>
        <button class="btn-add" onclick="openDialog()">+ 创建新AI伴侣</button>
    </div>

    <div class="row">
        <div class="col-5" th:each="item:${list}">
            <div class="card-item" th:onclick="|location.href='/toChat?sid=${item.soulmateId}'|">
                <img class="avatar" th:src="${item.avatarUrl}">
                <div class="name" th:text="${item.gfName}"></div>
                <div class="tag-box">
                    <el-tag th:each="tag:${#strings.arraySplit(item.characterTag,'、')}" size="small" effect="light" th:text="${tag}"></el-tag>
                </div>
            </div>
            <button class="del-btn" th:onclick="|del(${item.soulmateId})|">删除</button>
        </div>
        <div class="col-5">
            <div class="add-empty" onclick="openDialog()">+</div>
        </div>
    </div>
</div>

<div class="dialog-mask" id="mask">
    <div class="dialog-box">
        <div class="dialog-head">
            <span>创建AI伴侣</span>
            <span class="close-btn" onclick="closeDialog()">×</span>
        </div>
        <form th:action="@{/setting/soulmate/add}" method="post" id="createForm">
            <div class="form-item">
                <label><span class="required">*</span>伴侣名称</label>
                <input class="ipt" name="gfName" placeholder="输入伴侣昵称">
            </div>
            <div class="form-item">
                <label><span class="required">*</span>性格标签</label>
                <input class="ipt" name="characterTag" placeholder="例如：温柔、粘人、傲娇">
            </div>
            <div class="form-item">
                <label><span class="required">*</span>角色人设</label>
                <textarea class="ipt" rows="4" name="detailPrompt" placeholder="填写AI伴侣角色人设"></textarea>
            </div>
            <div class="form-item">
                <label>上传头像</label>
                <div style="display:flex;align-items:center;gap:16px;">
                    <input type="file" id="file">
                    <!-- 头像预览框 -->
                    <img id="previewImg" width="80" height="80" style="border-radius:50%;object-fit:cover;border:3px solid #f0f5ff;display:none;">
                </div>
                <input type="hidden" id="avatarUrl" name="avatarUrl">
                <span id="tip" style="color:#16a34a;display:block;margin-top:6px;"></span>
            </div>
            <div class="form-footer">
                <button type="button" class="btn-cancel" onclick="closeDialog()">取消</button>
                <button type="submit" class="btn-save">保存创建</button>
            </div>
        </form>
    </div>
</div>

<script>
    const mask = document.getElementById('mask');
    const fileInp = document.getElementById('file');
    const avaUrl = document.getElementById('avatarUrl');
    const tip = document.getElementById('tip');
    const previewImg = document.getElementById('previewImg');
    const createForm = document.getElementById('createForm');

    // 打开弹窗
    function openDialog(){
        mask.style.display = 'flex';
        tip.innerText = '';
        // 清空预览、清空文件
        previewImg.style.display = 'none';
        previewImg.src = '';
        fileInp.value = '';
        avaUrl.value = '';
    }
    //关闭弹窗
    function closeDialog(){
        mask.style.display = 'none';
    }

    //头像上传ajax
    fileInp.onchange = async function(){
        let file = this.files[0];
        if(!file) return;
        let fd = new FormData();
        fd.append("file",file);
        let res = await fetch("/avatar/soulmate/upload",{method:'POST',body:fd});
        let url = await res.text();
        avaUrl.value = url;
        tip.innerText = '✅ 头像上传成功';
        // 预览赋值、显示
        previewImg.src = url;
        previewImg.style.display = 'block';
    }

    //删除
    async function del(id){
        if(!confirm("确定删除？")) return;
        let res = await fetch("/setting/soulmate/del/"+id,{method:'POST'});
        if(res.ok) location.reload();
    }

    // 表单非空校验
    createForm.onsubmit = function(e){
        const gfName = this.querySelector('input[name="gfName"]').value.trim();
        const characterTag = this.querySelector('input[name="characterTag"]').value.trim();
        const detailPrompt = this.querySelector('textarea[name="detailPrompt"]').value.trim();

        if(!gfName){
            e.preventDefault();
            alert('请输入伴侣名称');
            this.querySelector('input[name="gfName"]').focus();
            return false;
        }
        if(!characterTag){
            e.preventDefault();
            alert('请输入性格标签');
            this.querySelector('input[name="characterTag"]').focus();
            return false;
        }
        if(!detailPrompt){
            e.preventDefault();
            alert('请填写角色人设');
            this.querySelector('textarea[name="detailPrompt"]').focus();
            return false;
        }
        return true;
    }
</script>
</body>
</html>
