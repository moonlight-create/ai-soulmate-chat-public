<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI伴侣聊天屋 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Microsoft Yahei", sans-serif;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            background: #fff;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.25);
        }

        .title {
            text-align: center;
            font-size: 26px;
            color: #333;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .error-tip {
            background: #ffe8e8;
            color: #e53e3e;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: block;
        }

        .form-item {
            margin-bottom: 22px;
        }

        .form-item label {
            display: block;
            font-size: 15px;
            color: #555;
            margin-bottom: 8px;
        }

        .form-item input[type="text"],
        .form-item input[type="password"] {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s;
        }

        .form-item input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .remember-box {
            display: flex;
            align-items: center;
            gap:8px;
            font-size:14px;
            color:#666;
        }

        .submit-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2 class="title">AI伴侣聊天屋</h2>
    <span class="error-tip" th:if="${param.error}">用户名或密码错误，请重新输入</span>

    <form th:action="@{/login}" method="post">
        <div class="form-item">
            <label>账号</label>
            <input type="text" name="username" required placeholder="请输入登录账号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" name="password" required placeholder="请输入登录密码">
        </div>
        <div class="form-item remember-box">
            <input type="checkbox" name="remember-me" id="rm">
            <label for="rm">记住我</label>
        </div>
        <div class="form-item">
            <input class="submit-btn" type="submit" value="立即登录">
        </div>
    </form>
</div>
</body>
</html>
