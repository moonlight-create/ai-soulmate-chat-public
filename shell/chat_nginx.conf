server {
    listen 80;
    server_name www.sunmoonlight.xyz sunmoonlight.xyz; # 你的专属域名

    access_log /var/log/nginx/chat_access.log;
    error_log  /var/log/nginx/chat_error.log;

    location / {
        proxy_pass http://127.0.0.1:4321;
       
       # 核心：放开上传大小限制，单位字节，这里设 10M
       client_max_body_size 10M;
       # 可选：超时时间，避免大文件上传中断
       client_body_timeout 60s;
 
        # 关键1：传递完整的 Host 和 Port
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # 关键2：让 Spring Security 识别反向代理，正确处理重定向
        proxy_redirect http://127.0.0.1:4321/ http://$host:$server_port/;
    }

    # 2. 专门为 /avatar 路径配置代理（和上面规则保持一致，避免重复配置）
    location /avatar/ {
        proxy_pass http://127.0.0.1:4321/avatar/;

        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_redirect http://127.0.0.1:4321/avatar/ http://$host:$server_port/avatar/;

        # 头像文件上传/下载允许 10M
        client_max_body_size 10M;
        client_body_timeout 60s;
    }

}
